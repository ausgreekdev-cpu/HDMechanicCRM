{% extends "base.html" %}{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3"><h4 class="mb-0">Bin Locations</h4><button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#newModal"><i class="bi bi-plus"></i> New Bin</button></div>
<div class="card"><div class="card-body p-0">
<table class="table table-sm mb-0"><thead><tr><th>Warehouse</th><th>Bin Code</th><th>Part</th><th>Max Capacity</th></tr></thead>
<tbody>{% for b in bins %}<tr><td>{{ b.warehouse.name if b.warehouse else '' }}</td><td><strong>{{ b.bin_code }}</strong></td><td>{{ b.part.name if b.part else 'Empty' }}</td><td>{{ b.max_capacity }}</td></tr>{% else %}<tr><td colspan="4" class="text-muted text-center">No bins</td></tr>{% endfor %}</tbody></table></div></div>
{% endblock %}
