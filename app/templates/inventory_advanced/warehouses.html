{% extends "base.html" %}{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3"><h4 class="mb-0">Warehouses</h4><button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#newModal"><i class="bi bi-plus"></i> New Warehouse</button></div>
<div class="row g-3">{% for w in warehouses %}<div class="col-md-4"><div class="card"><div class="card-body"><h5>{{ w.name }}</h5><small class="text-muted">{{ w.location or '' }}</small><br><span class="badge bg-info">{{ w.bins|length }} bins</span></div></div></div>{% else %}<div class="col-12"><div class="card"><div class="card-body text-muted text-center">No warehouses</div></div></div>{% endfor %}</div>
{% endblock %}
