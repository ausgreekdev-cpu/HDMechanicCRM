{% extends "base.html" %}{% block content %}
<h4 class="mb-3">Customer Statements</h4>
<div class="row">{% for c in customers %}<div class="col-md-4 mb-2"><a href="/finance/customer-statements/{{ c.id }}" class="text-decoration-none"><div class="card p-3"><h6 class="mb-0">{{ c.name }}</h6><small class="text-muted">{{ c.company or '' }}</small></div></a></div>{% else %}<div class="col-12"><div class="card"><div class="card-body text-muted text-center">No customers</div></div></div>{% endfor %}</div>
{% endblock %}
