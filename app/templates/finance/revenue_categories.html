{% extends "base.html" %}{% block content %}
<h4 class="mb-3">Revenue by Category — {{ year }}</h4>
<div class="row g-3"><div class="col-md-4"><div class="card text-center p-4"><h2 class="text-success">${{ '%.0f'|format(revenue) }}</h2><small>Service Revenue</small><span class="badge bg-info mt-2">{{ wo_count }} WOs</span></div></div>
<div class="col-md-4"><div class="card text-center p-4"><h2 class="text-secondary">${{ '%.0f'|format(scrap) }}</h2><small>Scrap Revenue</small></div></div>
<div class="col-md-4"><div class="card text-center p-4"><h2>${{ '%.0f'|format(revenue + scrap) }}</h2><small>Total Revenue</small></div></div></div>
{% endblock %}
