{% extends "base.html" %}
{% block content %}
<div class="mb-4">
    <h4 class="mb-0">{% if po %}Edit Purchase Order{% else %}New Purchase Order{% endif %}</h4>
</div>
<div class="card">
    <div class="card-body">
        <form method="post" action="{% if po %}/purchase-orders/{{ po.id }}/edit{% else %}/purchase-orders/new{% endif %}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="row g-3 mb-3">
                <div class="col-md-4">
                    <label class="form-label">Supplier *</label>
                    <select name="supplier_id" class="form-select" required>
                        <option value="">Select...</option>
                        {% for s in suppliers %}
                        <option value="{{ s.id }}" {% if po and po.supplier_id == s.id %}selected{% endif %}>{{ s.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Order Date</label>
                    <input type="date" name="order_date" class="form-control" value="{{ po.order_date.strftime('%Y-%m-%d') if po else '' }}">
                </div>
                <div class="col-12"><label class="form-label">Notes</label><textarea name="notes" class="form-control" rows="2">{{ po.notes if po else '' }}</textarea></div>
            </div>

            <h6 class="fw-bold mb-2">Line Items</h6>
            <div class="table-responsive mb-3">
                <table class="table table-bordered" id="items-table">
                    <thead><tr><th>Part</th><th>Quantity</th><th>Unit Cost</th><th style="width:50px"></th></tr></thead>
                    <tbody>
                        {% if po and po.items %}
                        {% for item in po.items %}
                        <tr class="item-row">
                            <td>
                                <select name="part_id" class="form-select form-select-sm">
                                    <option value="">Select...</option>
                                    {% for p in parts %}
                                    <option value="{{ p.id }}" {% if item.part_id == p.id %}selected{% endif %}>{{ p.name }} ({{ p.part_number or 'no#' }})</option>
                                    {% endfor %}
                                </select>
                            </td>
                            <td><input type="number" name="quantity" class="form-control form-control-sm" value="{{ item.quantity }}" min="1"></td>
                            <td><input type="number" step="0.01" name="unit_cost" class="form-control form-control-sm" value="{{ item.unit_cost }}"></td>
                            <td><button type="button" class="btn btn-sm btn-outline-danger remove-row"><i class="bi bi-x"></i></button></td>
                        </tr>
                        {% endfor %}
                        {% endif %}
                        <tr class="item-row">
                            <td>
                                <select name="part_id" class="form-select form-select-sm">
                                    <option value="">Select...</option>
                                    {% for p in parts %}
                                    <option value="{{ p.id }}">{{ p.name }} ({{ p.part_number or 'no#' }})</option>
                                    {% endfor %}
                                </select>
                            </td>
                            <td><input type="number" name="quantity" class="form-control form-control-sm" value="1" min="1"></td>
                            <td><input type="number" step="0.01" name="unit_cost" class="form-control form-control-sm" value="0"></td>
                            <td><button type="button" class="btn btn-sm btn-outline-danger remove-row"><i class="bi bi-x"></i></button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <button type="button" class="btn btn-sm btn-outline-primary mb-3" id="add-row"><i class="bi bi-plus-lg me-1"></i>Add Item</button>

            <div class="col-12">
                <button type="submit" class="btn btn-primary">{% if po %}Update{% else %}Create{% endif %} Purchase Order</button>
                <a href="/purchase-orders" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('add-row')?.addEventListener('click', function() {
    const tbody = document.querySelector('#items-table tbody');
    const first = tbody.querySelector('.item-row');
    const clone = first.cloneNode(true);
    clone.querySelectorAll('select, input').forEach(el => el.value = '');
    clone.querySelector('input[name="quantity"]').value = '1';
    clone.querySelector('input[name="unit_cost"]').value = '0';
    tbody.appendChild(clone);
});
document.addEventListener('click', function(e) {
    if (e.target.closest('.remove-row')) {
        const rows = document.querySelectorAll('.item-row');
        if (rows.length > 1) e.target.closest('.item-row').remove();
    }
});
</script>
{% endblock %}
