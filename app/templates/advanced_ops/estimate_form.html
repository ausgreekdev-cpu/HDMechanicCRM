{% extends "base.html" %}{% block content %}
<h4 class="mb-3">New Estimate</h4>
<div class="card"><div class="card-body">
<form method="POST"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<div class="row g-2 mb-3">
<div class="col-md-4"><label class="form-label">Customer *</label><select name="customer_id" class="form-select" required>{% for c in customers %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select></div>
<div class="col-md-4"><label class="form-label">Vehicle</label><select name="vehicle_id" class="form-select">{% for v in vehicles %}<option value="{{ v.id }}">{{ v.make }} {{ v.model }} ({{ v.license_plate or '' }})</option>{% endfor %}</select></div>
<div class="col-md-4"><label class="form-label">Title *</label><input type="text" name="title" class="form-control" required></div>
</div>
<div class="mb-3"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="2"></textarea></div>
<h6>Line Items</h6>
<table class="table table-sm" id="itemsTable"><thead><tr><th style="width:50%">Description</th><th style="width:80px">Qty</th><th style="width:100px">Price</th><th style="width:60px">Labor</th><th style="width:40px"></th></tr></thead>
<tbody><tr class="item-row"><td><input type="text" name="item_desc[]" class="form-control form-control-sm"></td>
<td><input type="number" name="item_qty[]" class="form-control form-control-sm" value="1"></td>
<td><input type="number" step="0.01" name="item_price[]" class="form-control form-control-sm" value="0"></td>
<td><div class="form-check mt-2"><input class="form-check-input" type="checkbox" name="item_labor[]"></div></td>
<td><button type="button" class="btn btn-sm btn-outline-danger" onclick="this.closest('tr').remove()">X</button></td></tr></tbody></table>
<button type="button" class="btn btn-sm btn-outline-primary mb-3" onclick="addRow()">+ Add Item</button>
<div class="mt-2"><button type="submit" class="btn btn-primary">Create Estimate</button> <a href="/ops/estimates" class="btn btn-outline-secondary">Cancel</a></div>
</form></div></div>
<script>function addRow(){var t=document.querySelector('#itemsTable tbody'),r=t.querySelector('.item-row').cloneNode(true);r.querySelectorAll('input').forEach(function(i){i.value=''});t.appendChild(r)}</script>
{% endblock %}
