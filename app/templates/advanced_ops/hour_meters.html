{% extends "base.html" %}{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3"><h4 class="mb-0">Hour Meter Readings</h4><button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#newModal"><i class="bi bi-plus"></i> New Reading</button></div>
<div class="card"><div class="card-body p-0">
<table class="table table-sm mb-0"><thead><tr><th>Date</th><th>Vehicle</th><th class="text-end">Hours</th><th>Notes</th></tr></thead>
<tbody>{% for r in records %}<tr><td><small>{{ r.reading_date.strftime('%m/%d/%Y') }}</small></td><td>{{ r.vehicle.make }} {{ r.vehicle.model }}</td><td class="text-end"><strong>{{ r.hours }}</strong></td><td><small class="text-muted">{{ r.notes or '' }}</small></td></tr>{% else %}<tr><td colspan="4" class="text-muted text-center">No readings</td></tr>{% endfor %}</tbody></table></div></div>
{% endblock %}
