{% extends "base.html" %}{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3"><h4 class="mb-0">Saved Filters</h4><button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#newModal"><i class="bi bi-plus"></i> Save Current Filter</button></div>
<div class="card"><div class="card-body p-0">
<table class="table table-sm mb-0"><thead><tr><th>Name</th><th>Entity</th><th>Default</th><th>Actions</th></tr></thead>
<tbody>{% for f in filters %}<tr><td><strong>{{ f.name }}</strong></td><td>{{ f.entity_type }}</td><td>{% if f.is_default %}<span class="badge bg-success">Default</span>{% endif %}</td><td><a href="/{{ f.entity_type }}?saved_filter={{ f.id }}" class="btn btn-sm btn-outline-primary">Apply</a></td></tr>{% else %}<tr><td colspan="4" class="text-muted text-center">No saved filters</td></tr>{% endfor %}</tbody></table></div></div>
{% endblock %}
