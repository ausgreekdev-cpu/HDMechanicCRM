{% extends "base.html" %}{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3"><h4 class="mb-0">Dashboard Widgets</h4><button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#newModal"><i class="bi bi-plus"></i> Add Widget</button></div>
<div class="row g-3">{% for w in widgets %}<div class="col-md-4"><div class="card"><div class="card-body d-flex justify-content-between"><div><strong>{{ w.title or w.widget_type }}</strong><br><small class="text-muted">{{ w.widget_type }}</small></div>
<form method="POST" action="/crm/dashboard-widgets/{{ w.id }}/toggle"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="btn btn-sm btn-outline-{{ 'secondary' if w.is_visible else 'success' }}">{{ 'Hide' if w.is_visible else 'Show' }}</button></form></div></div></div>{% else %}<div class="col-12"><div class="card"><div class="card-body text-muted text-center">No widgets configured</div></div></div>{% endfor %}</div>
{% endblock %}
