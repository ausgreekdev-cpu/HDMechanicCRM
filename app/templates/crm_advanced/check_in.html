{% extends "base.html" %}{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3"><h4 class="mb-0">Check-In: {{ wo.title }}</h4><a href="/work-orders/{{ wo.id }}" class="btn btn-outline-secondary btn-sm">Back to WO</a></div>
<div class="card"><div class="card-body">
<form method="POST" action="/crm/check-in/{{ wo.id }}/save"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<div class="row g-2"><div class="col-md-6"><label class="form-label">Checked In By</label><input type="text" name="checked_in_by" class="form-control" value="{{ current_user.display_name or '' }}"></div>
<div class="col-md-6"><label class="form-label">Customer Name</label><input type="text" name="customer_name" class="form-control" value="{{ wo.customer.name if wo.customer else '' }}"></div></div>
<div class="mb-2"><label class="form-label">Vehicle Condition</label><textarea name="vehicle_condition" class="form-control" rows="2"></textarea></div>
<div class="row g-2"><div class="col-md-4"><label class="form-label">Fuel Level</label><select name="fuel_level" class="form-select"><option value="">--</option><option>1/8</option><option>1/4</option><option>3/8</option><option>1/2</option><option>5/8</option><option>3/4</option><option>7/8</option><option>Full</option></select></div>
<div class="col-md-4"><label class="form-label">Odometer</label><input type="number" name="odometer" class="form-control"></div>
<div class="col-md-4"><div class="form-check mt-4"><input class="form-check-input" type="checkbox" name="keys_received" checked><label class="form-check-label">Keys Received</label></div></div></div>
<div class="mb-2"><label class="form-label">Damage Notes</label><textarea name="damage_notes" class="form-control" rows="2"></textarea></div>
<div class="mb-2"><label class="form-label">Customer Signature (text)</label><input type="text" name="customer_signature" class="form-control" placeholder="Type customer name as signature"></div>
<button type="submit" class="btn btn-primary">Complete Check-In</button></form></div></div>
{% endblock %}
