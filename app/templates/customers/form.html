{% extends "base.html" %}
{% block content %}
<div class="mb-4">
    <h4 class="mb-0">{% if customer %}Edit Customer{% else %}New Customer{% endif %}</h4>
</div>
<div class="card">
    <div class="card-body">
        <form method="post" action="{% if customer %}/customers/{{ customer.id }}/edit{% else %}/customers/new{% endif %}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label">Name *</label><input type="text" name="name" class="form-control" value="{{ customer.name if customer else '' }}" required></div>
                <div class="col-md-6"><label class="form-label">Company</label><input type="text" name="company" class="form-control" value="{{ customer.company if customer else '' }}"></div>
                <div class="col-md-4"><label class="form-label">Phone</label><input type="text" name="phone" class="form-control" value="{{ customer.phone if customer else '' }}"></div>
                <div class="col-md-4"><label class="form-label">Email</label><input type="email" name="email" class="form-control" value="{{ customer.email if customer else '' }}"></div>
                <div class="col-md-4"><label class="form-label">Address</label><input type="text" name="address" class="form-control" value="{{ customer.address if customer else '' }}"></div>
                <div class="col-12"><label class="form-label">Notes</label><textarea name="notes" class="form-control" rows="3">{{ customer.notes if customer else '' }}</textarea></div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">{% if customer %}Update{% else %}Create{% endif %} Customer</button>
                    <a href="/customers" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
