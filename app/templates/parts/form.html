{% extends "base.html" %}
{% block content %}
<div class="mb-4">
    <h4 class="mb-0">{% if part %}Edit Part{% else %}New Part{% endif %}</h4>
</div>
<div class="card">
    <div class="card-body">
        <form method="post" action="{% if part %}/parts/{{ part.id }}/edit{% else %}/parts/new{% endif %}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label">Name *</label><input type="text" name="name" class="form-control" value="{{ part.name if part else '' }}" required></div>
                <div class="col-md-3"><label class="form-label">Part #</label><input type="text" name="part_number" class="form-control" value="{{ part.part_number if part else '' }}"></div>
                <div class="col-md-3"><label class="form-label">Barcode</label><input type="text" name="barcode" class="form-control" value="{{ part.barcode if part else '' }}" placeholder="Scan or enter barcode"></div>
                <div class="col-md-4"><label class="form-label">Category</label><input type="text" name="category" class="form-control" value="{{ part.category if part else '' }}"></div>
                <div class="col-md-4"><label class="form-label">Supplier</label><input type="text" name="supplier" class="form-control" value="{{ part.supplier if part else '' }}"></div>
                <div class="col-md-4"><label class="form-label">Supplier Part #</label><input type="text" name="supplier_part_number" class="form-control" value="{{ part.supplier_part_number if part else '' }}"></div>
                <div class="col-md-2"><label class="form-label">Cost Price</label><input type="number" step="0.01" name="cost_price" class="form-control" value="{{ part.cost_price if part else '0' }}"></div>
                <div class="col-md-2"><label class="form-label">Selling Price</label><input type="number" step="0.01" name="selling_price" class="form-control" value="{{ part.selling_price if part else '0' }}"></div>
                <div class="col-md-2"><label class="form-label">Qty on Hand</label><input type="number" name="quantity_on_hand" class="form-control" value="{{ part.quantity_on_hand if part else '0' }}"></div>
                <div class="col-md-2"><label class="form-label">Min Qty</label><input type="number" name="min_quantity" class="form-control" value="{{ part.min_quantity if part else '5' }}"></div>
                <div class="col-md-2"><label class="form-label">Max Qty</label><input type="number" name="max_quantity" class="form-control" value="{{ part.max_quantity if part else '0' }}" placeholder="0 = no max"></div>
                <div class="col-md-2"><label class="form-label">Location</label><input type="text" name="location" class="form-control" value="{{ part.location if part else '' }}"></div>
                <div class="col-12"><label class="form-label">Notes</label><textarea name="notes" class="form-control" rows="2">{{ part.notes if part else '' }}</textarea></div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">{% if part %}Update{% else %}Create{% endif %} Part</button>
                    <a href="/parts" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
