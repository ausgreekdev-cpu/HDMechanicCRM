<nav aria-label="Page navigation" class="mt-3">
    <ul class="pagination pagination-sm justify-content-center mb-0">
        <li class="page-item {{ 'disabled' if not p.has_prev }}">
            <a class="page-link" href="?page={{ p.prev_page }}&per_page={{ p.per_page }}{% if extra %}&{{ extra }}{% endif %}">«</a>
        </li>
        {% for n in range(1, p.pages + 1) %}
        <li class="page-item {{ 'active' if n == p.page }}">
            <a class="page-link" href="?page={{ n }}&per_page={{ p.per_page }}{% if extra %}&{{ extra }}{% endif %}">{{ n }}</a>
        </li>
        {% endfor %}
        <li class="page-item {{ 'disabled' if not p.has_next }}">
            <a class="page-link" href="?page={{ p.next_page }}&per_page={{ p.per_page }}{% if extra %}&{{ extra }}{% endif %}">»</a>
        </li>
    </ul>
    <small class="text-muted d-block text-center mt-1">{{ p.total }} total — {{ p.per_page }} per page</small>
</nav>
