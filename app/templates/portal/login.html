<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Portal — HD Mechanic CRM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container" style="max-width: 420px; margin-top: 100px;">
    <div class="card shadow">
      <div class="card-body p-4">
        <h4 class="text-center mb-3"><i class="bi bi-tools"></i> Customer Portal</h4>
        <p class="text-muted text-center small mb-4">View your invoices, work orders, and service reminders</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} alert-dismissible fade show">{{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
        {% endfor %}
        {% endif %}
        {% endwith %}
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-control" required placeholder="your@email.com">
          </div>
          <div class="mb-3">
            <label class="form-label">Phone Number (PIN)</label>
            <input type="text" name="reference" class="form-control" required placeholder="Last 4 digits or full phone">
          </div>
          <button type="submit" class="btn btn-primary w-100">Sign In</button>
        </form>
        <div class="text-center mt-3"><a href="/login" class="small">Staff Login</a></div>
      </div>
    </div>
  </div>
</body>
</html>
