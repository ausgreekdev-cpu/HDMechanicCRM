{% extends "base.html" %}
{% block content %}
<div class="mb-4">
    <h4 class="mb-0">{% if work_order %}Edit Work Order{% else %}New Work Order{% endif %}</h4>
</div>
<div class="card">
    <div class="card-body">
        <form method="post" action="{% if work_order %}/work-orders/{{ work_order.id }}/edit{% else %}/work-orders/new{% endif %}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Customer *</label>
                    <select name="customer_id" class="form-select" required>
                        <option value="">Select...</option>
                        {% for c in customers %}
                        <option value="{{ c.id }}" {% if work_order and work_order.customer_id == c.id %}selected{% endif %}>{{ c.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Vehicle *</label>
                    <select name="vehicle_id" class="form-select" required>
                        <option value="">Select...</option>
                        {% for v in vehicles %}
                        <option value="{{ v.id }}" {% if work_order and work_order.vehicle_id == v.id %}selected{% endif %}>{{ v.make }} {{ v.model }} ({{ v.license_plate or 'no plate' }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-8"><label class="form-label">Title *</label><input type="text" name="title" class="form-control" value="{{ work_order.title if work_order else '' }}" required></div>
                <div class="col-md-2"><label class="form-label">Labor Hours</label><input type="number" step="0.5" name="labor_hours" class="form-control" value="{{ work_order.labor_hours if work_order else '0' }}"></div>
                <div class="col-md-2"><label class="form-label">Rate ($/hr)</label><input type="number" step="5" name="labor_rate" class="form-control" value="{{ work_order.labor_rate if work_order else '150' }}"></div>
                <div class="col-md-6"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="3">{{ work_order.description if work_order else '' }}</textarea></div>
                <div class="col-md-6"><label class="form-label">Diagnosis</label><textarea name="diagnosis" class="form-control" rows="3">{{ work_order.diagnosis if work_order else '' }}</textarea></div>
                <div class="col-md-4"><label class="form-label">Status</label><select name="status" class="form-select">{% for s in statuses %}<option value="{{ s }}" {% if work_order and work_order.status == s %}selected{% endif %}>{{ s }}</option>{% endfor %}</select></div>
                <div class="col-12"><label class="form-label">Notes</label><textarea name="notes" class="form-control" rows="2">{{ work_order.notes if work_order else '' }}</textarea></div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">{% if work_order %}Update{% else %}Create{% endif %} Work Order</button>
                    <a href="/work-orders" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
