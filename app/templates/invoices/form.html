{% extends "base.html" %}
{% block content %}
<div class="mb-4">
    <h4 class="mb-0">New Invoice</h4>
</div>
<div class="card">
    <div class="card-body">
        <form method="post" action="/invoices/new">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="row g-3">
                <div class="col-md-8">
                    <label class="form-label">Work Order *</label>
                    <select name="work_order_id" class="form-select" required>
                        <option value="">Select completed work order...</option>
                        {% for wo in work_orders %}
                        <option value="{{ wo.id }}">#{{ wo.id }} - {{ wo.title[:80] }} - ${{ "%.2f"|format(wo.total_amount) }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4"><label class="form-label">Tax Rate (%)</label><input type="number" step="0.1" name="tax_rate" class="form-control" value="0"></div>
                <div class="col-12"><label class="form-label">Notes</label><textarea name="notes" class="form-control" rows="3"></textarea></div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Generate Invoice</button>
                    <a href="/invoices" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
