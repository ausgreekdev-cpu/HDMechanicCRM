services:
  web:
    build: .
    ports:
      - "${CRM_PORT:-8000}:8000"
    environment:
      - CRM_SECRET_KEY=${CRM_SECRET_KEY}
      - CRM_ADMIN_USER=${CRM_ADMIN_USER:-admin}
      - CRM_ADMIN_PASSWORD=${CRM_ADMIN_PASSWORD}
      - CRM_DATABASE_URL=${CRM_DATABASE_URL:-}
      - FLASK_DEBUG=0
      - CRM_LOG_LEVEL=${CRM_LOG_LEVEL:-INFO}
      - CRM_LOG_FILE=${CRM_LOG_FILE:-}
      - CRM_GUNICORN_WORKERS=${CRM_GUNICORN_WORKERS:-}
      - CRM_GUNICORN_TIMEOUT=${CRM_GUNICORN_TIMEOUT:-120}
      - CRM_SMTP_SERVER=${CRM_SMTP_SERVER:-}
      - CRM_SMTP_PORT=${CRM_SMTP_PORT:-587}
      - CRM_SMTP_USERNAME=${CRM_SMTP_USERNAME:-}
      - CRM_SMTP_PASSWORD=${CRM_SMTP_PASSWORD:-}
      - CRM_SMTP_FROM=${CRM_SMTP_FROM:-}
    volumes:
      - crm-data:/app/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - crm-ssl:/etc/nginx/ssl
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

volumes:
  crm-data:
  crm-ssl:

networks:
  backend:
    driver: bridge
