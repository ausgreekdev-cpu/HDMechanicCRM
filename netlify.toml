[build]
  command = "pip install -r requirements.txt serverless-wsgi -t netlify/functions/vendor && mkdir -p public"
  functions = "netlify/functions"
  publish = "public"

[build.environment]
  PYTHON_VERSION = "3.12"

# All routes go through the serverless function
[[redirects]]
  from = "/.netlify/functions/handler"
  to = "/.netlify/functions/handler/"
  status = 301

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/handler/:splat"
  status = 200

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[functions]
  node_bundler = "esbuild"
  included_files = [
    "app/**",
    "data/**"
  ]
