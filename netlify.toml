[build]
  command = """
    mkdir -p public &&
    cp -r app netlify/functions/app &&
    mkdir -p netlify/functions/data
  """
  functions = "netlify/functions"
  publish = "public"

[build.environment]
  PYTHON_VERSION = "3.12"

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/handler/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
